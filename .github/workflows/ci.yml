name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  ABSURD_SQL_REF: 0.4.0

jobs:
  lint-test:
    name: Lint, test, DB integration, and package
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: absurd_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d absurd_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ABSURD_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/absurd_test
    steps:
      - uses: actions/checkout@v6
      - name: Checkout Absurd SQL
        run: git clone --depth 1 --branch "$ABSURD_SQL_REF" https://github.com/earendil-works/absurd "$RUNNER_TEMP/absurd-upstream"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-targets --all-features
      - name: Install Postgres client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      - name: Initialize Absurd SQL
        run: psql "$ABSURD_DATABASE_URL" -v ON_ERROR_STOP=1 -f "$RUNNER_TEMP/absurd-upstream/sql/absurd.sql"
      - run: cargo test-db
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --all-features
      - run: cargo package

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets --all-features

  dependencies:
    name: Dependency policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          command-arguments: advisories bans licenses sources
